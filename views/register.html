<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Akun - Kelompok B5</title>
    <style>
        body { background-color: #f1f5f9; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .register-card { background: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; padding: 35px; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 6px; }
        .input-field { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background-color: #f8fafc; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; font-size: 16px; font-weight: 600; border-radius: 6px; background-color: #2563eb; color: white; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h3 style="margin: 0 0 5px 0; color: #0f172a;">Daftar Akun Baru B5</h3>
        <p style="margin: 0 0 20px 0; color: #64748b; font-size: 14px;">Portal Registrasi Khusus Pegawai / Karyawan</p>
        <form id="formRegister">
            <div class="form-group">
                <label>NAMA LENGKAP</label>
                <input type="text" id="nama" class="input-field" placeholder="Masukkan nama" required>
            </div>
            <div class="form-group">
                <label>EMAIL</label>
                <input type="email" id="email" class="input-field" placeholder="Masukkan email" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" class="input-field" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-submit">Daftar Akun</button>
            <p style="text-align: center; margin-top: 15px; font-size: 14px; margin-bottom: 0;">
                Sudah punya akun? <a href="login.html" style="color: #2563eb; text-decoration: none; font-weight: 600;">Login di sini</a>
            </p>
        </form>
    </div>
    <script>
        document.getElementById('formRegister').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // FORCE / KUNCI SECARA AMAN DI FRONTEND DAN BACKEND AGAR OTOMATIS BER-ROLE PEGAWAI (2)
                    body: JSON.stringify({ nama, email, password, role_id: 2 })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("Registrasi sukses! Akun pegawai Anda telah didaftarkan.");
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || "Gagal registrasi.");
                }
            } catch (error) {
                alert("Gagal terhubung ke server.");
            }
        });
    </script>
</body>
</html>

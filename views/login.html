<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem Perjalanan Dinas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-ui/dist/basecoat.min.css">
    <style>
        body {
            background-color: #f1f5f9;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            padding: 35px;
            box-sizing: border-box;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100% !important;
            padding: 12px !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 6px !important;
            font-size: 15px !important;
            background-color: #f8fafc !important;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100% !important;
            padding: 12px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            border-radius: 6px !important;
            background-color: #0f172a !important;
            color: white !important;
            border: none !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-dark font-bold mb-1">Login Sistem B5</h3>
        <p class="text-muted small mb-4">Portal Aplikasi Perjalanan Dinas</p>
        
        <form id="formLogin">
            <div class="form-group">
                <label>EMAIL AKUN</label>
                <input type="email" id="email" class="input-field" placeholder="Masukkan email" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" class="input-field" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-submit">Masuk</button>
            <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                Belum punya akun? <a href="register.html" style="color: #2563eb; font-weight: 600; text-decoration: none;">Daftar di sini</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (response.ok) {
                    // Simpan token keamanan di storage browser
                    localStorage.setItem('tiket_token', data.tiket_token);
                    
                    // PENENTU JALUR AKSES (ROLE REDIRECT)
                    if (data.role_id === 1) {
                        // Jika role_id = 1 (Pimpinan / Admin Zaki)
                        window.location.href = 'dashboard.html';
                    } else if (data.role_id === 2) {
                        // Jika role_id = 2 (Pegawai / User Vanesa, dll)
                        window.location.href = 'user-dashboard.html';
                    } else {
                        alert("Role akun tidak dikenali.");
                    }
                } else {
                    alert(data.pesan || "Email atau password salah.");
                }
            } catch (error) {
                alert("Gagal terhubung ke server backend.");
            }
        });
    </script>
</body>
</html>
